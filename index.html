<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro Score</title>
    <style>
        body { margin: 0; background: #050508; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .ui { padding: 20px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .score-box { text-align: center; margin-top: 50px; }
        #scoreDisplay { font-size: 80px; font-weight: bold; display: block; }
        input { width: 100%; margin: 10px 0; }
    </style>
</head>
<body>

<canvas id="skyCanvas"></canvas>

<div class="ui">
    <div class="score-box">
        <span id="scoreDisplay">0</span>
        <div id="verdictDisplay">Analyzing...</div>
    </div>

    <div>Облака: <span id="cloudsVal">0%</span></div>
    <input type="range" id="clouds" min="0" max="100" value="10" oninput="calculate()">

    <div>Видимость: <span id="visVal">24 км</span></div>
    <input type="range" id="vis" min="0" max="24000" value="20000" oninput="calculate()">

    <div>Ветер: <span id="windVal">2 м/с</span></div>
    <input type="range" id="wind" min="0" max="25" value="3" oninput="calculate()">

    <select id="mode" onchange="calculate()">
        <option value="wide">Wide Field</option>
        <option value="milky_way">Milky Way</option>
        <option value="deep_sky">Deep Sky</option>
    </select>
</div>

<script>
    const canvas = document.getElementById('skyCanvas');
    const ctx = canvas.getContext('2d');
    
    // Инициализация размеров
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Заглушки для объектов (чтобы код не падал)
    let stars = Array.from({length: 100}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        alpha: Math.random(),
        scintillation: Math.random() * 0.02,
        dir: 1,
        color: '#fff'
    }));
    let nebulas = []; // Можно добавить свои координаты
    let milkyWayStars = [];

    // ТВОЙ КОД DRAWSPACE
    function drawSpace() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let v = parseInt(document.getElementById('vis').value);
        let c = parseInt(document.getElementById('clouds').value);
        let purity = Math.max(0, (1 - c/100) * (v/24000));

        ctx.globalCompositeOperation = 'screen';
        nebulas.forEach(n => {
            let g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.radius);
            let alphaColor = n.color.replace(/[^,]+(?=\))/, (purity * 0.4).toFixed(3));
            g.addColorStop(0, alphaColor);
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.radius, 0, Math.PI*2);
            ctx.fill();
        });

        ctx.globalCompositeOperation = 'source-over';
        stars.forEach(s => {
            s.alpha += s.scintillation * s.dir;
            if(s.alpha >= 1 || s.alpha <= 0.3) s.dir *= -1;
            ctx.globalAlpha = s.alpha * purity;
            ctx.fillStyle = s.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
            ctx.fill();
        });

        requestAnimationFrame(drawSpace);
    }

    // ТВОЙ КОД CALCULATE
    function calculate() {
        let m = document.getElementById('mode').value;
        let c = parseInt(document.getElementById('clouds').value);
        let v = parseInt(document.getElementById('vis').value);
        let w = parseInt(document.getElementById('wind').value);

        document.getElementById('cloudsVal').innerText = c + '%';
        document.getElementById('visVal').innerText = (v / 1000).toFixed(0) + ' км';
        document.getElementById('windVal').innerText = w + ' м/с';

        let score = 10;
        if (c > 20) score -= 2;
        if (c > 50) score -= 2;
        if (v < 8000) score -= 1;
        if (v < 2000) score -= 5;
        if (w > 12) score -= 1;

        score = Math.max(0, Math.min(10, score));
        let res = document.getElementById('scoreDisplay');
        let verd = document.getElementById('verdictDisplay');
        res.innerText = score;
        
        if (score >= 8) { res.style.color = '#00ffaa'; verd.innerText = "Excellent"; }
        else if (score >= 5) { res.style.color = '#ffcc00'; verd.innerText = "Fair"; }
        else { res.style.color = '#ff4444'; verd.innerText = "Poor"; }
    }

    // Запуск
    calculate();
    drawSpace();
</script>
</body>
</html>
