<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astro-Pro Toolkit</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #02040a;
            --text-color: #ffffff;
            --accent-color: #8fb6ff;
            --glass-bg: rgba(10, 15, 25, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --good-color: #00ffaa;
            --warn-color: #ffcc00;
            --bad-color: #ff4444;
        }

        body.red-mode {
            --bg-color: #050000;
            --text-color: #ff3333;
            --accent-color: #ff0000;
            --glass-bg: rgba(25, 5, 5, 0.6);
            --glass-border: rgba(255, 0, 0, 0.2);
            --good-color: #ff3333;
            --warn-color: #ff0000;
            --bad-color: #aa0000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 15px;
            margin: 0;
            box-sizing: border-box;
            overflow-x: hidden;
            min-height: 100vh;
            transition: all 0.5s ease;
        }

        input, select, textarea {
            -webkit-user-select: auto !important;
            user-select: auto !important;
        }

        #skyContainer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; transform-origin: center center; transition: transform 0.3s ease-out;
        }

        #starCanvas {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            animation: rotateSky 1200s linear infinite;
            transform: translateZ(0); 
            will-change: transform;
        }

        @keyframes rotateSky {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        h2 {
            font-size: 20px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase;
            background: linear-gradient(to bottom, var(--text-color) 0%, var(--accent-color) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
        }
        body.red-mode h2 { background: none; color: var(--accent-color); -webkit-text-fill-color: var(--accent-color); }

        .btn-red {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color);
            padding: 8px 16px; border-radius: 20px; font-size: 12px; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;
        }

        /* --- ТАБЫ (ВКЛАДКИ) --- */
        .tabs-container {
            display: flex; justify-content: space-between;
            background: var(--glass-bg); border-radius: 16px;
            padding: 4px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; color: var(--text-color);
            padding: 10px 0; border-radius: 12px; font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
            transition: all 0.3s; opacity: 0.6;
        }
        .tab-btn.active { background: rgba(255,255,255,0.15); opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        body.red-mode .tab-btn.active { background: rgba(255,0,0,0.2); }
        .tab-content { display: none; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- ЭЛЕМЕНТЫ УПРАВЛЕНИЯ --- */
        .control-group, .result-box {
            margin-top: 15px; background: var(--glass-bg); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            padding: 16px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            transition: all 0.5s ease;
        }

        .header-flex {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1.5px;
        }
        body.red-mode .header-flex { color: rgba(255,0,0,0.6); }

        .num-input {
            width: 55px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: var(--accent-color); border-radius: 8px; padding: 6px 2px;
            font-size: 14px; text-align: center; font-family: inherit; font-weight: 600; outline: none; transition: all 0.3s;
            -webkit-appearance: none; appearance: none;
        }
        .num-input:focus { border-color: var(--accent-color); background: rgba(255, 255, 255, 0.15); }
        body.red-mode .num-input { background: rgba(255, 0, 0, 0.05); }
        body.red-mode .num-input:focus { background: rgba(255, 0, 0, 0.15); }
         
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
            background: var(--text-color); cursor: pointer; margin-top: -7px;
            box-shadow: 0 0 15px var(--accent-color);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 2px;
        }
        body.red-mode input[type=range]::-webkit-slider-runnable-track { background: rgba(255, 0, 0, 0.2); }

        select {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid var(--glass-border); background-color: rgba(0, 0, 0, 0.3);
            color: var(--text-color); font-size: 15px; appearance: none; margin-bottom: 10px;
        }

        .flex-row { display: flex; gap: 10px; margin-top: 10px; }
        .flex-col { flex: 1; text-align: center; }
        .val-big { font-size: 32px; font-weight: 200; margin: 5px 0; color: var(--text-color); }
        .val-label { font-size: 10px; text-transform: uppercase; opacity: 0.6; }
        .verdict { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; opacity: 0.9; margin-top: 10px; text-align: center; }

        .btn-action {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-color);
            padding: 12px 16px; border-radius: 16px; font-size: 14px; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;
            width: 100%; font-weight: 600; margin-top: 10px;
        }
        .btn-action:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
        body.red-mode .btn-action:active { background: rgba(255,0,0,0.2); }

        .radar-container {
            width: 100%; height: 240px; margin: 0 auto; position: relative;
            border-radius: 50%; border: 1px solid var(--glass-border);
            background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(255,255,255,0.05) 100%);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
            max-width: 240px;
        }
        body.red-mode .radar-container { background: radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(255,0,0,0.05) 100%); }
         
        .visualizer-box {
            width: 100%; height: 120px; border-radius: 16px; 
            border: 1px solid var(--glass-border); background: rgba(0,0,0,0.5);
            margin-top: 15px; position: relative; overflow: hidden;
        }

    </style>
</head>
<body>

    <div id="skyContainer"><canvas id="starCanvas"></canvas></div>

    <div class="top-bar">
        <h2>Astro-Pro</h2>
        <button class="btn-red" onclick="toggleRedMode()" id="btnRed">🔴 Night</button>
    </div>

    <!-- Вкладки -->
    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('tab-weather', this)">Погода</button>
        <button class="tab-btn" onclick="switchTab('tab-shutter', this)">Выдержка</button>
        <button class="tab-btn" onclick="switchTab('tab-radar', this)">Радар</button>
        <button class="tab-btn" onclick="switchTab('tab-dew', this)">Роса</button>
    </div>

    <!-- ================= Вкладка: ПОГОДА ================= -->
    <div id="tab-weather" class="tab-content active">
        <div class="control-group">
            <label class="header-flex"><span>Режим съёмки</span><span></span></label>
            <select id="mode" oninput="calculate()">
                <option value="milky_way">🌌 Млечный Путь</option>
                <option value="landscape">⛰ Ночной пейзаж</option>
                <option value="deep_sky">🔭 Deep Sky</option>
            </select>
        </div>

        <div class="control-group">
            <div class="header-flex">
                <span>Облачность</span>
                <span><input type="text" inputmode="decimal" id="cloudsNum" class="num-input" value="0" onclick="this.select()" oninput="document.getElementById('clouds').value = this.value; calculate();"> %</span>
            </div>
            <input type="range" id="clouds" min="0" max="100" value="0" oninput="document.getElementById('cloudsNum').value = this.value; calculate();">
            <br>
             
            <div class="header-flex">
                <span>Видимость</span>
                <span><input type="text" inputmode="decimal" id="visNum" class="num-input" value="24000" step="1000" onclick="this.select()" oninput="document.getElementById('vis').value = this.value; calculate();"> м</span>
            </div>
            <input type="range" id="vis" min="0" max="24000" step="1000" value="24000" oninput="document.getElementById('visNum').value = this.value; calculate();">
        </div>

        <div class="result-box">
            <div class="flex-row">
                <div class="flex-col">
                    <div class="val-label">Рейтинг неба</div>
                    <div id="scoreDisplay" class="val-big">10</div>
                </div>
                <div class="flex-col" style="display:flex; align-items:center; justify-content:center;">
                    <div id="verdictDisplay" class="verdict">Excellent</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= Вкладка: ВЫДЕРЖКА ================= -->
    <div id="tab-shutter" class="tab-content">
        <div class="control-group">
            <label class="header-flex"><span>Система / Матрица</span><span></span></label>
            <select id="cameraProfile" onchange="updateProfile()">
                <option value="nikon_z_fx">Nikon Z (FX) - Full Frame</option>
                <option value="nikon_z_dx">Nikon Z (DX) - APS-C</option>
                <option value="fujifilm_x_apsc" selected>Fujifilm X - APS-C</option>
                <option value="sony_e_ff">Sony E - Full Frame</option>
                <option value="sony_e_apsc">Sony E - APS-C</option>
                <option value="canon_rf_ff">Canon RF - Full Frame</option>
                <option value="canon_rf_apsc">Canon RF - APS-C</option>
                <option value="ricoh_gr_apsc">Ricoh GR - APS-C</option>
                <option value="leica_l_ff">Leica L - Full Frame</option>
                <option value="leica_m_ff">Leica M - Full Frame</option>
                <option value="leica_q_ff">Leica Q - Full Frame</option>
            </select>

            <div class="header-flex" style="margin-top: 10px;">
                <span>Разрешение</span>
                <span><input type="text" inputmode="decimal" id="mpNum" class="num-input" value="26" onclick="this.select()" oninput="document.getElementById('mp').value = this.value; calculateShutter();"> Мп</span>
            </div>
            <input type="range" id="mp" min="10" max="100" value="26" oninput="document.getElementById('mpNum').value = this.value; calculateShutter();">
        </div>

        <div class="control-group">
            <div class="header-flex">
                <span>Фокусное (мм)</span>
                <span><input type="text" inputmode="decimal" id="focalNum" class="num-input" value="16" onclick="this.select()" oninput="document.getElementById('focal').value = this.value; calculateShutter();"></span>
            </div>
            <input type="range" id="focal" min="10" max="400" value="16" oninput="document.getElementById('focalNum').value = this.value; calculateShutter();">
             
            <div class="header-flex" style="margin-top: 15px;">
                <span>Тестовая выдержка</span>
                <span><input type="text" inputmode="decimal" id="testExpNum" class="num-input" value="15" onclick="this.select()" oninput="document.getElementById('testExp').value = this.value; drawStarTrails();"> с</span>
            </div>
            <input type="range" id="testExp" min="1" max="60" value="15" oninput="document.getElementById('testExpNum').value = this.value; drawStarTrails();">
             
            <!-- Интерактивный канвас для смаза -->
            <div class="visualizer-box">
                <canvas id="trailCanvas" style="width: 100%; height: 100%;"></canvas>
            </div>
        </div>

        <div class="result-box">
            <div class="flex-row">
                <div class="flex-col">
                    <div class="val-label">Шаг пикселя</div>
                    <div id="pixelPitchDisplay" class="val-big" style="font-size:24px; opacity:0.7">0 мкм</div>
                </div>
                <div class="flex-col">
                    <div class="val-label">Идеал (без смаза)</div>
                    <div id="shutterMax" class="val-big" style="color: var(--accent-color)">0s</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= Вкладка: РАДАР ================= -->
    <div id="tab-radar" class="tab-content">
        <div class="control-group">
            <label class="header-flex"><span>Режим сканирования радара</span><span></span></label>
            <select id="radarMode" onchange="rSpots = [];">
                <option value="milky_way">🌌 Млечный Путь (Поиск тьмы)</option>
                <option value="thunderstorm">⛈ Грозовой трекер (Ячейки молний)</option>
                <option value="fog">🌫 Туманный фронт (Дымка/Влажность)</option>
                <option value="aurora">🌈 Охота за Сиянием (Вектор на Север)</option>
            </select>
        </div>

        <div class="control-group">
            <div class="radar-container">
                <canvas id="radarCanvas" width="240" height="240"></canvas>
            </div>
            <div class="result-box" style="padding: 12px; margin-top: 15px;">
                <div id="radarResult" class="verdict" style="margin:0; font-size: 11px;">РАДАР ПОДКЛЮЧЕН К СЕРВЕРУ</div>
            </div>
            <button class="btn-action" id="scanBtn" onclick="startScan()">📡 Запустить сканирование</button>
        </div>
    </div>

    <!-- ================= Вкладка: РОСА ================= -->
    <div id="tab-dew" class="tab-content">
        <div class="control-group">
            <div class="header-flex">
                <span>Температура (°C)</span>
                <span><input type="text" inputmode="decimal" id="tempNum" class="num-input" value="15" onclick="this.select()" oninput="document.getElementById('temp').value = this.value; calculateDew();"></span>
            </div>
            <input type="range" id="temp" min="-20" max="40" value="15" oninput="document.getElementById('tempNum').value = this.value; calculateDew();">
            <br>
            <div class="header-flex">
                <span>Влажность (%)</span>
                <span><input type="text" inputmode="decimal" id="humNum" class="num-input" value="75" onclick="this.select()" oninput="document.getElementById('hum').value = this.value; calculateDew();"></span>
            </div>
            <input type="range" id="hum" min="20" max="100" value="75" oninput="document.getElementById('humNum').value = this.value; calculateDew();">
        </div>
         
        <div class="result-box">
            <div class="flex-row">
                <div class="flex-col">
                    <div class="val-label">Точка росы</div>
                    <div id="dewDisplay" class="val-big">10.6°C</div>
                </div>
            </div>
            <div id="dewVerdict" class="verdict">Объектив в безопасности</div>
        </div>
    </div>

    <div style="height: 50px;"></div>

    <script>
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        // АБСОЛЮТНЫЙ АДРЕС ТВОЕГО БЭКЕНДА ЧЕРЕЗ NGROK
        const BACKEND_URL = "https://legume-crescent-barge.ngrok-free.dev";

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            if(tabId === 'tab-shutter') setTimeout(initTrails, 50); 
        }

        let isRedMode = false;
        function toggleRedMode() {
            isRedMode = !isRedMode;
            document.body.classList.toggle('red-mode', isRedMode);
            document.getElementById('btnRed').innerText = isRedMode ? "⚪ Normal" : "🔴 Night";
            calculate(); calculateDew(); drawStarTrails();
        }

        // --- BACKGROUND COCOON ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        let stars = [], milkyWayStars = [], nebulas = [], cloudParticles = [];
        const starColors = ['#ffffff', '#fff4ea', '#eaf4ff', '#fff9e5'];

        const cameraProfiles = {
            "nikon_z_fx": { width: 36.0, crop: 1.0, mp: 24 },
            "nikon_z_dx": { width: 23.5, crop: 1.5, mp: 20 },
            "fujifilm_x_apsc": { width: 23.5, crop: 1.5, mp: 26 },
            "sony_e_ff": { width: 35.9, crop: 1.0, mp: 33 },
            "sony_e_apsc": { width: 23.5, crop: 1.5, mp: 24 },
            "canon_rf_ff": { width: 36.0, crop: 1.0, mp: 24 },
            "canon_rf_apsc": { width: 22.3, crop: 1.6, mp: 24 },
            "ricoh_gr_apsc": { width: 23.7, crop: 1.5, mp: 24 },
            "leica_l_ff": { width: 36.0, crop: 1.0, mp: 47 },
            "leica_m_ff": { width: 36.0, crop: 1.0, mp: 40 },
            "leica_q_ff": { width: 36.0, crop: 1.0, mp: 47 }
        };

        function initSpace() {
            canvas.width = window.innerWidth * 1.5; canvas.height = window.innerHeight * 1.5;
            stars = []; milkyWayStars = []; nebulas = []; cloudParticles = [];
            for(let i=0; i<40; i++) { 
                let x = canvas.width/2 + (Math.random()-0.5)*canvas.width*0.8;
                let y = canvas.height/2 + (Math.random()-0.5)*canvas.height*0.3;
                let r = Math.random()*300+100;
                let gradNormal = ctx.createRadialGradient(x, y, 0, x, y, r);
                gradNormal.addColorStop(0, `rgba(${30+Math.random()*20}, ${30+Math.random()*40}, ${80+Math.random()*50}, 1)`);
                gradNormal.addColorStop(1, 'transparent');
                let gradRed = ctx.createRadialGradient(x, y, 0, x, y, r);
                gradRed.addColorStop(0, `rgba(255, 0, 0, 1)`);
                gradRed.addColorStop(1, 'transparent');
                nebulas.push({ x, y, r, gradNormal, gradRed, a: 0.03+Math.random()*0.02 });
            }
            for(let i=0; i<1500; i++) milkyWayStars.push({ x: canvas.width/2 + (Math.random()-0.5)*canvas.width*0.7, y: canvas.height/2 + (Math.random()-0.5)*canvas.height*0.25, s: Math.random()*0.8+0.5, a: Math.random()*0.5 });
            for(let i=0; i<800; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.5, c: starColors[Math.floor(Math.random()*starColors.length)], a: Math.random(), sc: Math.random()*0.02+0.005, d: Math.random()>0.5?1:-1 });
            for(let i=0; i<30; i++) cloudParticles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 300 + 100, vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 0.5 });
        }

        function drawSpace() {
            ctx.fillStyle = isRedMode ? '#050000' : '#02040a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            let v = parseInt(document.getElementById('visNum').value) || 0;
            let c = parseInt(document.getElementById('cloudsNum').value) || 0;
            let deepPurity = Math.max(0, (1 - c/100) * (v/24000));
            ctx.globalCompositeOperation = 'screen';
            nebulas.forEach(n => { ctx.fillAlpha = n.a * deepPurity; ctx.fillStyle = isRedMode ? n.gradRed : n.gradNormal; ctx.fillRect(n.x - n.r, n.y - n.r, n.r * 2, n.r * 2); });
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = isRedMode ? `rgba(255,50,50,1)` : `rgba(255,255,255,1)`;
            milkyWayStars.forEach(s => { ctx.globalAlpha = s.a * deepPurity; ctx.fillRect(s.x, s.y, s.s, s.s); });
            let starPurity = Math.max(0, (1 - c/100) * Math.pow(v/24000, 0.5));
            stars.forEach(s => { s.a += s.sc*s.d; if(s.a>=1 || s.a<=0.3) s.d*=-1; ctx.globalAlpha = s.a * starPurity; ctx.fillStyle = isRedMode ? '#ff4444' : s.c; ctx.fillRect(s.x, s.y, s.r * 2, s.r * 2); });
            if (v < 24000) { let fogDensity = 1 - (v / 24000); ctx.globalAlpha = 1; ctx.fillStyle = isRedMode ? `rgba(80, 0, 0, ${fogDensity * 0.85})` : `rgba(60, 70, 90, ${fogDensity * 0.85})`; ctx.fillRect(0, 0, canvas.width, canvas.height); }
            if (c > 0) { ctx.globalAlpha = c / 100; ctx.fillStyle = isRedMode ? '#1a0505' : '#0a0d14'; ctx.beginPath(); cloudParticles.forEach(cp => { cp.x += cp.vx; cp.y += cp.vy; if(cp.x > canvas.width + cp.r) cp.x = -cp.r; if(cp.x < -cp.r) cp.x = canvas.width + cp.r; ctx.moveTo(cp.x, cp.y); ctx.arc(cp.x, cp.y, cp.r, 0, Math.PI*2); }); ctx.fill(); }
            requestAnimationFrame(drawSpace);
        }

        // --- MATH CALCULATORS ---
        function calculate() {
            let c = parseInt(document.getElementById('cloudsNum').value) || 0;
            let v = parseInt(document.getElementById('visNum').value) || 0;
            let score = 10;
            if (c > 20) score -= 2; if (c > 50) score -= 2;
            if (v < 8000) score -= 1; if (v < 2000) score -= 5;
            score = Math.max(0, Math.min(10, score));
            let res = document.getElementById('scoreDisplay'); let verd = document.getElementById('verdictDisplay');
            res.innerText = score;
            if (score >= 8) { res.style.color = 'var(--good-color)'; verd.innerText = "Excellent"; }
            else if (score >= 5) { res.style.color = 'var(--warn-color)'; verd.innerText = "Fair"; }
            else { res.style.color = 'var(--bad-color)'; verd.innerText = "Poor"; }
        }

        function calculateDew() {
            let T = parseFloat(document.getElementById('tempNum').value) || 15; 
            let RH = parseFloat(document.getElementById('humNum').value) || 75;
            let alpha = (17.27 * T) / (237.7 + T) + Math.log(RH / 100); 
            let dp = (237.7 * alpha) / (17.27 - alpha);
            document.getElementById('dewDisplay').innerText = (dp>0?'+':'') + dp.toFixed(1) + '°C';
            let diff = T - dp; let verd = document.getElementById('dewVerdict');
            if (diff <= 2) { verd.innerText = "Опасность росы!"; verd.style.color = 'var(--bad-color)'; }
            else if (diff <= 4) { verd.innerText = "Риск запотевания"; verd.style.color = 'var(--warn-color)'; }
            else { verd.innerText = "В безопасности"; verd.style.color = 'var(--good-color)'; }
        }

        function updateProfile() {
            let key = document.getElementById('cameraProfile').value; let profile = cameraProfiles[key];
            document.getElementById('mpNum').value = profile.mp; document.getElementById('mp').value = profile.mp;
            calculateShutter();
        }

        function calculateShutter() {
            let key = document.getElementById('cameraProfile').value; let profile = cameraProfiles[key];
            let focal = Math.max(1, parseFloat(document.getElementById('focalNum').value) || 16);
            let mp = Math.max(1, parseFloat(document.getElementById('mpNum').value) || profile.mp);
            let widthPx = Math.sqrt((mp * 1000000.0) * (3.0/2.0));
            let pitchUm = (profile.width / widthPx) * 1000.0;
            document.getElementById('pixelPitchDisplay').innerText = pitchUm.toFixed(2) + ' мкм';
            let k = 600; if (pitchUm <= 4.0) k = 300; else if (pitchUm <= 5.0) k = 400; else if (pitchUm <= 6.0) k = 500;
            let maxExposure = k / (focal * profile.crop); maxExposure = Math.max(1.0, Math.min(maxExposure, 60.0)); 
            document.getElementById('shutterMax').innerText = maxExposure.toFixed(1) + 's';
            let scale = focal / 16; if(scale < 0.6) scale = 0.6; if(scale > 3) scale = 3; document.getElementById('skyContainer').style.transform = `scale(${scale})`;
            drawStarTrails();
        }

        // --- INTERACTIVE SHUTTER TRAILS ---
        let trailCanvas = document.getElementById('trailCanvas'); let trailCtx = trailCanvas.getContext('2d'); let tStars = [];
        function initTrails() {
            trailCanvas.width = trailCanvas.clientWidth; trailCanvas.height = trailCanvas.clientHeight; tStars = [];
            let cx = trailCanvas.width * 0.3; let cy = trailCanvas.height * 0.8;
            for(let i=0; i<60; i++) {
                let x = Math.random() * trailCanvas.width; let y = Math.random() * trailCanvas.height; let dx = x - cx; let dy = y - cy;
                tStars.push({ x: x, y: y, dist: Math.sqrt(dx*dx + dy*dy), angle: Math.atan2(dy, dx), s: Math.random() * 1.5 + 0.5, cx: cx, cy: cy });
            }
            drawStarTrails();
        }

        function drawStarTrails() {
            if(!trailCanvas.width) return; trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            let maxExp = parseFloat(document.getElementById('shutterMax').innerText) || 10;
            let currentExp = parseFloat(document.getElementById('testExpNum').value) || 15;
            let focal = parseFloat(document.getElementById('focalNum').value) || 16;
            let overExposure = Math.max(0, currentExp - maxExp); let stretchFactor = overExposure * (focal / 20) * 0.002; 
            trailCtx.fillStyle = isRedMode ? '#ff4444' : '#ffffff'; trailCtx.strokeStyle = isRedMode ? '#ff4444' : '#ffffff'; trailCtx.lineCap = "round";
            tStars.forEach(star => {
                if (stretchFactor > 0.001) {
                    let endAngle = star.angle + stretchFactor;
                    trailCtx.beginPath(); trailCtx.lineWidth = star.s; trailCtx.moveTo(star.x, star.y);
                    trailCtx.lineTo(star.cx + Math.cos(endAngle) * star.dist, star.cy + Math.sin(endAngle) * star.dist); trailCtx.stroke();
                } else {
                    trailCtx.beginPath(); trailCtx.arc(star.x, star.y, star.s, 0, Math.PI*2); trailCtx.fill();
                }
            });
        }

        // --- REAL-TIME RADAR MOTOR ENGINE ---
        const rCanvas = document.getElementById('radarCanvas'); const rCtx = rCanvas.getContext('2d');
        let radarAngle = 0, isScanning = false, scanSpeed = 0.05, pulseAnim = 0;
        let rSpots = [];
        let rWidth = rCanvas.width, rHeight = rCanvas.height, rCenter = rWidth / 2;

        async function startScan() {
            if(isScanning) return;
            
            isScanning = true; radarAngle = 0; scanSpeed = 0.15; rSpots = [];
            let currentMode = document.getElementById('radarMode').value;
            let btn = document.getElementById('scanBtn'); let res = document.getElementById('radarResult');
            
            btn.innerText = "СКАНИРОВАНИЕ..."; btn.style.opacity = "0.5";
            res.innerText = `Запрос к бэкенду Ngrok [Режим: ${currentMode.toUpperCase()}]...`;
            res.style.color = "var(--text-color)";

            let userLat = 47.2357; let userLon = 39.7015;

            try {
                const response = await fetch(`${BACKEND_URL}/api/radar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ lat: userLat, lon: userLon, mode: currentMode })
                });

                const data = await response.json();
                isScanning = false;
                btn.innerText = "📡 Сканировать заново"; btn.style.opacity = "1";

                if (data.status === "ok" && data.spots.length > 0) {
                    data.spots.forEach(spot => {
                        let angleRad = (spot.bearing_deg - 90) * Math.PI / 180;
                        let visualDist = spot.distance * 0.6;

                        rSpots.push({
                            x: Math.cos(angleRad) * visualDist,
                            y: Math.sin(angleRad) * visualDist,
                            name: spot.name,
                            score: parseFloat(Number(spot.score).toFixed(1)),
                            type: spot.type
                        });
                    });

                    let topSpot = data.spots[0];
                    // ПРИМЕНЯЕМ ОКРУГЛЕНИЕ ДЛЯ ТЕКСТОВОГО ВЫВОДА
                    let displayDist = Math.round(topSpot.distance);
                    let displayScore = parseFloat(Number(topSpot.score).toFixed(1));

                    if (currentMode === 'thunderstorm') {
                        res.innerText = `ВНИМАНИЕ: Ближайшая гроза ${topSpot.name} в ${displayDist} км!`;
                        res.style.color = "var(--bad-color)";
                    } else if (currentMode === 'aurora') {
                        res.innerText = `ОХОТА ЗА СИЯНИЕМ: Kp-индекс равен ${displayScore}. Смотри на Север!`;
                        res.style.color = "var(--good-color)";
                    } else if (currentMode === 'fog') {
                        res.innerText = `ФРОНТ ТУМАНА: Обнаружены банки влажности в секторе ${topSpot.name}`;
                        res.style.color = "var(--warn-color)";
                    } else {
                        res.innerText = `УСПЕХ: Найдено темное небо в ${topSpot.name} (Скор: ${displayScore}/10)`;
                        res.style.color = "var(--good-color)";
                    }

                    if (window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.notificationOccurred("success");
                } else {
                    res.innerText = "Сервер вернул пустой массив спотов под этот режим.";
                    res.style.color = "var(--warn-color)";
                }

            } catch (error) {
                isScanning = false; btn.innerText = "📡 Повторить попытку"; btn.style.opacity = "1";
                res.innerText = "Ошибка Ngrok: Сервер недоступен или CORS заблокирован.";
                res.style.color = "var(--bad-color)";
            }
        }

        function drawRadar() {
            rCtx.clearRect(0, 0, rWidth, rHeight);
            let currentMode = document.getElementById('radarMode').value;
            pulseAnim += 0.05;

            rCtx.strokeStyle = isRedMode ? 'rgba(255, 0, 0, 0.25)' : 'rgba(143, 182, 255, 0.25)';
            rCtx.lineWidth = 1; rCtx.beginPath();
            rCtx.arc(rCenter, rCenter, rCenter - 2, 0, Math.PI * 2);
            rCtx.arc(rCenter, rCenter, (rCenter - 2) * 0.66, 0, Math.PI * 2);
            rCtx.arc(rCenter, rCenter, (rCenter - 2) * 0.33, 0, Math.PI * 2);
            rCtx.moveTo(rCenter, 0); rCtx.lineTo(rCenter, rHeight); rCtx.moveTo(0, rCenter); rCtx.lineTo(rWidth, rCenter);
            rCtx.stroke();

            rSpots.forEach(spot => {
                rCtx.save();
                let sx = rCenter + spot.x; let sy = rCenter + spot.y;

                if (currentMode === 'thunderstorm') {
                    let pulseRadius = 6 + Math.abs(Math.sin(pulseAnim)) * 14;
                    rCtx.strokeStyle = 'rgba(255, 68, 68, 0.4)';
                    rCtx.lineWidth = 1.5; rCtx.beginPath(); rCtx.arc(sx, sy, pulseRadius, 0, Math.PI * 2); rCtx.stroke();
                    rCtx.fillStyle = '#ff4444'; rCtx.beginPath(); rCtx.arc(sx, sy, 5, 0, Math.PI * 2); rCtx.fill();
                } 
                else if (currentMode === 'fog') {
                    let fogGrad = rCtx.createRadialGradient(sx, sy, 2, sx, sy, 20);
                    fogGrad.addColorStop(0, isRedMode ? 'rgba(255,200,0,0.6)' : 'rgba(230,240,255,0.6)');
                    fogGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    rCtx.fillStyle = fogGrad; rCtx.beginPath(); rCtx.arc(sx, sy, 20, 0, Math.PI * 2); rCtx.fill();
                }
                else if (currentMode === 'aurora') {
                    rCtx.strokeStyle = isRedMode ? 'rgba(255, 50, 50, 0.7)' : 'rgba(0, 255, 170, 0.7)';
                    rCtx.lineWidth = 3; rCtx.lineCap = "round";
                    rCtx.beginPath(); rCtx.arc(sx, sy, 12, Math.PI, Math.PI * 2); rCtx.stroke();
                }
                else {
                    rCtx.shadowBlur = 8; rCtx.shadowColor = 'var(--good-color)';
                    rCtx.fillStyle = 'var(--good-color)'; rCtx.beginPath(); rCtx.arc(sx, sy, 4, 0, Math.PI * 2); rCtx.fill();
                }
                rCtx.restore();
            });

            if (isScanning) {
                rCtx.save(); rCtx.translate(rCenter, rCenter); rCtx.rotate(radarAngle);
                rCtx.beginPath(); rCtx.moveTo(0, 0); rCtx.arc(0, 0, rCenter, 0, 0.3); rCtx.closePath();
                let grad = rCtx.createRadialGradient(0,0,0, 0,0,rCenter);
                grad.addColorStop(0, isRedMode ? 'rgba(255,0,0,0.4)' : 'rgba(143,182,255,0.4)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                rCtx.fillStyle = grad; rCtx.fill(); rCtx.restore();
                radarAngle += scanSpeed; if (scanSpeed > 0.01) scanSpeed *= 0.99;
            }
            requestAnimationFrame(drawRadar);
        }

        window.addEventListener('resize', () => { initSpace(); initTrails(); });
        initSpace(); drawSpace(); drawRadar(); calculate(); calculateShutter(); calculateDew();
        setTimeout(initTrails, 100); 
    </script>
</body>
</html>
